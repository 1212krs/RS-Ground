# Render 배포 설계도(Blueprint).
# Render 대시보드에서 이 저장소를 연결하면 이 파일을 읽어 백엔드 서버를 자동 구성한다.
# 문서: https://render.com/docs/blueprint-spec
#
# 주의: 아래 "영구 디스크(disk)"는 무료 플랜에서는 지원되지 않는다.
#       그래서 plan을 유료(starter)로 지정했다. 벡터DB를 재배포 후에도 유지하려면 필요.

services:
  - type: web                     # 웹으로 접속 가능한 서버
    name: rs-ground-api           # Render 안에서 이 서비스의 이름(자유롭게 변경 가능)
    runtime: python
    plan: starter                 # 영구 디스크를 쓰려면 최소 유료 플랜(무료 플랜은 디스크 불가)
    rootDir: backend              # 이 폴더를 기준으로 실행(여기에 requirements.txt·main.py가 있음)
    buildCommand: pip install -r requirements.txt   # 배포 시 파이썬 라이브러리 설치
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT   # 서버 실행($PORT는 Render가 자동 지정)

    envVars:
      # --- 비밀 키: 값은 여기 적지 않고 Render 대시보드에서 직접 입력한다(sync: false) ---
      - key: ANTHROPIC_API_KEY    # 채팅·보고서 생성용 Claude 키
        sync: false
      - key: UPSTAGE_API_KEY      # 임베딩(문서 벡터화)용 키 — 재색인에 필요
        sync: false

      # --- 프론트(Vercel) 주소를 CORS 허용 명단에 추가 ---
      # 값은 Vercel 배포 후 정해지는 주소로 대시보드에서 입력(예: https://rs-ground.vercel.app)
      - key: FRONTEND_ORIGINS
        sync: false

      # --- 생성 데이터(벡터DB 등)를 영구 디스크에 저장하도록 경로 지정 ---
      - key: RSG_DATA_DIR
        value: /var/data          # 아래 disk의 mountPath와 반드시 같아야 함

      # --- 파이썬 버전 고정(개발에 쓴 3.11.9와 맞춤) ---
      - key: PYTHON_VERSION
        value: 3.11.9

    # 재배포해도 지워지지 않는 저장공간. 벡터DB·임베딩 캐시가 여기 저장된다.
    disk:
      name: rsg-data
      mountPath: /var/data        # RSG_DATA_DIR 값과 동일해야 함
      sizeGB: 1                   # 현재 벡터DB(~200MB)+캐시(~90MB) 기준 충분. 문서 늘면 키우면 됨
